version: 2

models:
  - name: silver_customers
    description: "Clientes com tratamento de nulos geográficos e remoção de duplicatas."
    columns:
      - name: customer_id
        description: "Identificador único do cliente."
        data_tests:
          - not_null
          - unique
      - name: customer_name
        description: "Nome do cliente."
        data_tests:
          - not_null
      - name: customer_email
        description: "Email do cliente."
        data_tests:
          - not_null
      - name: customer_city
        description: "Cidade do cliente. Valor 'Não identificado' quando nulo na origem."
        data_tests:
          - not_null
      - name: customer_state
        description: "Estado do cliente. Valor 'Não identificado' quando nulo na origem."
        data_tests:
          - not_null
      - name: dado_incompleto
        description: "Flag indicando se o registro possui dado geográfico incompleto na origem."
        data_tests:
          - not_null

  - name: silver_orders
    description: "Pedidos com tratamento de status inválidos e sinalização de inconsistências de entrega."
    columns:
      - name: order_id
        description: "Identificador único do pedido."
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: "Identificador do cliente associado ao pedido."
        data_tests:
          - not_null
      - name: order_status_original
        description: "Status original do pedido conforme dado bruto."
        data_tests:
          - not_null
      - name: order_status
        description: "Status tratado. Valores inválidos substituídos por 'Não identificado'."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'processing', 'Não identificado']
      - name: status_valido
        description: "Flag indicando se o status original pertence ao domínio válido."
        data_tests:
          - not_null
      - name: order_purchase_timestamp
        description: "Data e hora da compra do pedido."
        data_tests:
          - not_null
      - name: entrega_inconsistente
        description: "Flag indicando pedidos com status delivered mas sem data de entrega registrada."
        data_tests:
          - not_null

  - name: silver_products
    description: "Produtos com tratamento de categoria nula."
    columns:
      - name: product_id
        description: "Identificador único do produto."
        data_tests:
          - not_null
          - unique
      - name: product_name
        description: "Nome do produto."
        data_tests:
          - not_null
      - name: product_category
        description: "Categoria do produto. Valor 'Não identificado' quando nulo na origem."
        data_tests:
          - not_null
      - name: product_weight_g
        description: "Peso do produto em gramas."
        data_tests:
          - not_null
      - name: dado_incompleto
        description: "Flag indicando se a categoria do produto estava nula na origem."
        data_tests:
          - not_null

  - name: silver_sellers
    description: "Vendedores com validação de UF e preservação do valor original para auditoria."
    columns:
      - name: seller_id
        description: "Identificador único do vendedor."
        data_tests:
          - not_null
          - unique
      - name: seller_name
        description: "Nome do vendedor."
        data_tests:
          - not_null
      - name: seller_city
        description: "Cidade do vendedor."
        data_tests:
          - not_null
      - name: seller_state_original
        description: "UF original do vendedor conforme dado bruto, preservada para auditoria."
        data_tests:
          - not_null
      - name: seller_state
        description: "UF tratada. Valores fora do domínio substituídos por 'Não identificado'."
        data_tests:
          - not_null
      - name: estado_valido
        description: "Flag indicando se a UF original pertence ao domínio válido de estados brasileiros."
        data_tests:
          - not_null

  - name: silver_order_items
    description: "Itens de pedido com sinalização de pedidos órfãos e preços inválidos."
    columns:
      - name: order_item_id
        description: "Identificador único do item de pedido."
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: "Identificador do pedido associado ao item."
        data_tests:
          - not_null
      - name: pedido_orfao
        description: "Flag indicando se o order_id não possui correspondência na tabela de pedidos."
        data_tests:
          - not_null
      - name: product_id
        description: "Identificador do produto associado ao item."
        data_tests:
          - not_null
      - name: seller_id
        description: "Identificador do vendedor associado ao item."
        data_tests:
          - not_null
      - name: price_original
        description: "Preço original do item conforme dado bruto."
      - name: price
        description: "Preço tratado. Valores negativos ou zero substituídos por NULL."
      - name: preco_invalido
        description: "Flag indicando se o preço original era negativo ou zero."
        data_tests:
          - not_null
      - name: freight_value
        description: "Valor do frete do item."
        data_tests:
          - not_null